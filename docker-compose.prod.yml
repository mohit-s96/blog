# compose.prod.yml
services:
  blog-v2:
    ports: []
    labels:
      - traefik.enable=true
      - traefik.http.routers.blog-v2.rule=Host(`v2.mohits.dev`)
      - traefik.http.services.blog-v2.loadbalancer.server.port=80
      # future stuff
      # - traefik.http.routers.blog-v2.entrypoints=websecure
      # - traefik.http.routers.blog-v2.tls=true
      # - traefik.http.routers.blog-v2.tls.certresolver=letsencrypt
    networks:
      - traefik

networks:
  traefik:
    external: true
